<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Student Portal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Student Portal - Admin Panel</h1>
    </header>

    <nav>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/services">Services</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/login">Logout</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Student Management</h2>

            <!-- Add New Student Form -->
            <h3>Add New Student</h3>
            <form id="addStudentForm">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <input type="text" id="course" placeholder="Course (e.g., B.Tech CSE)" required>
                <input type="text" id="year" placeholder="Year (e.g., 3rd)" required>
                <input type="number" id="gpa" placeholder="GPA" step="0.1" min="0" max="10" required>
                <button type="submit">Add Student</button>
            </form>

            <hr>

            <!-- Students Table -->
            <h3>All Students</h3>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Year</th>
                        <th>GPA</th>
                    </tr>
                </thead>
                <tbody id="studentsTable"></tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Admin-specific script
        document.getElementById('addStudentForm').addEventListener('submit', async(e) => {
            e.preventDefault();

            const newStudent = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value,
                year: document.getElementById('year').value,
                gpa: parseFloat(document.getElementById('gpa').value)
            };

            try {
                const res = await fetch('/api/students', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newStudent)
                });

                if (res.ok) {
                    alert('Student added successfully!');
                    document.getElementById('addStudentForm').reset();
                    loadStudents(); // Refresh table
                } else {
                    alert('Failed to add student');
                }
            } catch (err) {
                alert('Server error');
            }
        });
    </script>
</body>

</html>
